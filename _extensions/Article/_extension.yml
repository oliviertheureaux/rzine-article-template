title: Template article Rzine
author: Rzine CoreTeam
version: 0.1.0
quarto-required: ">=1.5.0"

contributes:
  formats:

    html:
      toc: true          
      number-sections: true
      anchor-sections: true # ajoute un petit symbole de lien à côté de chaque titre
      toc-title: Sommaire   # "table des matières" à la fin d'un document
      code-copy: true       # ajoute un bouton copier qui permet de copier les blocs de code
      code-block-background: true  # couleur de fond pour les blocs de code
      bibliography: references.bib  
      csl: universite-de-montreal-apa.csl  # style de la biblio, ici APA
      license: "CC BY-SA"
      date-format: long
      # highlight-style: github
      syntax-highlighting: github  # nouvelle syntaxe https://quarto.org/docs/output-formats/html-code.html?
      
      shortcodes: 
        # You can include here Lua filters defining shortcodes from your extension
        - shortcodes.lua # aujourd'hui le filtre est vide
      
      citation:  # génére les blocs en bas de page Bibtex et "veuillez citer..."
        type: article-journal
        container-title: Rzine
        issn: 2743-8791
      
      title-block-banner: "#0c3762"
      title-block-banner-color: "#C4D6EE"
      toc-location: right
      toc-expand: 2
      format-links: false
      tbl-cap-location: bottom
      cap-location: bottom
      template-partials:
          - "partials/html/title-block.html"
          - "partials/html/title-metadata.html"
      reference-location: document # ou se place la biblio, ici à la fin du document
      hover-citations: true  # infobulle contenant la référence bibliographique complète
      hover-footnotes: true  # infobulle pour les notes de bas de page
      fig-format: svg
      code-summary: "Cacher/Montrer le code"
      code-fold: false
      link-external-newwindow: true # Tous les liens externes s'ouvrent dans un nouvel onglet du navigateur
      css: styles.css
      embed-resources: true # Créer un fichier HTML autonome avec les CSS, les polices, le JS, etc.
      
      crossref:  # impose des libellés
        sec-prefix: Section
        eq-prefix: Equation
        fig-prefix: Figure
        tbl-prefix: Table
     
      html-math-method: katex # comment afficher les formules mathématiques dans le HTML

      format-resources:
        - "logo.png"
        - "cc-by.png"
        - "styles.css"
        - "fonts/LiberationSans-Regular.ttf"     # police open source qui copie l'Arial
        - "fonts/LiberationSans-Bold.ttf"
        - "fonts/LiberationSans-Italic.ttf"
        - "fonts/LiberationSans-BoldItalic.ttf"

    pdf:
      filters:  # filtres Lua additionnels
        - author-bibtex.lua # génére les informations pour le BibTeX des auteurs
        - citation-text.lua # sert à fabriquer le texte du bloc "Veuillez citer ce travail comme suit :"
      
      toc: true
      number-sections: true
      anchor-sections: true
      toc-title: Sommaire
      code-copy: true
      code-block-background: true
      bibliography: references.bib  
      csl: universite-de-montreal-apa.csl
      license: "CC BY-SA"
      date-format: long
      syntax-highlighting: github 
        
      shortcodes:
        - shortcodes.lua
      
      citation:
        type: article-journal
        container-title: Rzine
        issn: 2743-8791
      
      pdf-engine: lualatex   # fixe le moteur LaTeX (ici basé sur Lua)
      papersize: a4
      geometry:              # contrôle les marges
        - top=25mm
        - bottom=25mm
        - left=25mm
        - right=25mm
      fontsize: 11pt
      linestretch: 1.08 # contrôle l'interligne
      
      ## pour la font voir : include-in-header.tex
      # fontfamily: montserrat
      # monofont: montserrat
      # mainfont: "Liberation Sans"  # police principale
      # sansfont: "Liberation Sans"  # police sans-serif pour LaTex/Quarto
      monofont: "DejaVu Sans Mono" # police pour les chunks
      monofontoptions:
        - Scale=0.92  # réduit la taille des police des chunks
      
      colorlinks: true  # couleur des liens
      linkcolor: MidnightBlue
      citecolor: MidnightBlue
      urlcolor: MidnightBlue
      toccolor: MidnightBlue
      
      code-block-bg: "#F2F2F2"        # couleur de fond pour les chunks
      code-block-border-left: false   # supprime des comportements bizarres quand contenu dans la marge  
      # https://quarto.org/docs/authoring/article-layout.html?   Dans PDF/ code blocks
      
      tbl-cap-location: bottom
      cap-location: bottom

      lof: true # liste des figures
      lof-title: "Liste des figures"
      lot: true # liste des tables
      lot-title: "Liste des tableaux"
      
      include-in-header:
        - "partials/pdf/include-in-header.tex"
        
        # - text: | 
        #     \usepackage{fvextra}
        #     \RecustomVerbatimEnvironment{Highlighting}{Verbatim}{ 
        #       breaklines,
        #       breaksymbolleft={},
        #       breaksymbolright={},
        #       commandchars=\\\{\}
        #     }
        # fvextra : package latex qui améliore l'affichage brute de verbatim
        # highlighting c'est les chunks dans l'environnement Pandoc 
        # verbatim : moteur d'affichage brute (aucune modif)
        # commandchars : pour garder le style des chunks
        # https://distrib-coffee.ipsl.jussieu.fr/pub/mirrors/ctan/macros/latex/contrib/fvextra/fvextra.pdf  (page 6)
        
      template-partials:
        - "partials/pdf/before-body.tex"

      format-resources:
        - "logo.png"
        - "cc-by.png"